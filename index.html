<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASESOR TRONEX - VIBRAS POSITIVAS HM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .tronex-gradient {
            background: linear-gradient(135deg, #ED1C24 0%, #8b1115 100%);
        }
        .glass-card {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(237, 28, 36, 0.2);
            border-radius: 2.5rem;
        }
        .input-style {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-style:focus {
            border-color: #ED1C24;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            box-shadow: 0 0 15px rgba(237, 28, 36, 0.3);
        }
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
            transform: scale(1.02);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-md shadow-2xl overflow-hidden">
        <div class="p-8 text-center bg-black/40">
            <img src="tronex.PNG" alt="Logo Tronex" class="h-16 mx-auto mb-3 drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">
            <h1 class="text-xl font-black tracking-tighter italic">MAYORISTA MONTERÍA</h1>
            <div class="h-1 w-20 tronex-gradient mx-auto mt-2 rounded-full"></div>
        </div>

        <div class="p-6 space-y-6">
            <div class="space-y-3">
                <input type="text" id="nombre" placeholder="Nombre o Empresa" class="input-style w-full p-4 rounded-2xl text-sm">
                <input type="tel" id="celular" placeholder="Celular" class="input-style w-full p-4 rounded-2xl text-sm">
                <select id="motivo" class="input-style w-full p-4 rounded-2xl text-sm text-gray-400">
                    <option value="Pedido Mayorista">📦 Pedido Mayorista</option>
                    <option value="Lista de Precios">💰 Lista de Precios</option>
                    <option value="Distribución">🤝 Alianza Comercial</option>
                </select>
            </div>

            <div class="space-y-3">
                <button onclick="enviarWhatsApp()" class="btn-glow w-full flex items-center justify-between p-5 bg-green-600 text-white rounded-3xl font-bold transition-all">
                    <div class="flex items-center space-x-3">
                        <i class="fab fa-whatsapp text-2xl"></i>
                        <div class="text-left">
                            <span class="block">EMIL SUÁREZ</span>
                            <span class="text-[10px] uppercase tracking-widest opacity-80">Asesor Comercial</span>
                        </div>
                    </div>
                    <i class="fas fa-external-link-alt text-xs opacity-50"></i>
                </button>

                <a href="tronex1.pdf" target="_blank" class="w-full flex items-center justify-center space-x-3 p-4 tronex-gradient text-white rounded-3xl font-black italic tracking-widest hover:opacity-90 transition-all">
                    <i class="fas fa-bolt text-yellow-400"></i>
                    <span>VER CATÁLOGO 2026</span>
                </a>
            </div>

            <div class="flex justify-center space-x-6 pt-2">
                <a href="https://www.instagram.com/tronexcolombia" target="_blank" class="text-gray-500 hover:text-pink-500 transition-colors text-2xl">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://www.facebook.com/TronexColombia/" target="_blank" class="text-gray-500 hover:text-blue-500 transition-colors text-2xl">
                    <i class="fab fa-facebook"></i>
                </a>
                <a href="mailto:emilsuarez21@gmail.com" class="text-gray-500 hover:text-red-500 transition-colors text-2xl">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </div>

        <div class="bg-black/60 p-6 text-center border-t border-white/5">
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em] mb-1">Proyecto Desarrollado por</p>
            <p class="text-sm font-black text-white tracking-widest uppercase">VIBRAS POSITIVAS HM</p>
            <p class="text-[9px] text-gray-600 mt-2">DERECHOS DE AUTOR © 2026</p>
        </div>
    </div>

    <script>
        function enviarWhatsApp() {
            const nom = document.getElementById('nombre').value;
            const cel = document.getElementById('celular').value;
            const mot = document.getElementById('motivo').value;
            const wa = "573207919193"; // Emil Suárez

            if (!nom || !cel) {
                alert("Por favor, ingresa tu nombre y celular.");
                return;
            }

            const texto = `⚡ *TRONEX MAYORISTA MONTERÍA* ⚡\n\n` +
                          `👤 *Cliente:* ${nom}\n` +
                          `📱 *Celular:* ${cel}\n` +
                          `🎯 *Interés:* ${mot}\n\n` +
                          `Hola Emil, solicito información para distribución mayorista.`;

            window.open(`https://wa.me/${wa}?text=${encodeURIComponent(texto)}`, '_blank');
        }
    </script>
</body>
</html>
