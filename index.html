<button onclick="enviarWhatsApp()" class="btn-glow w-full flex items-center justify-between p-5 bg-green-600 text-white rounded-3xl font-bold transition-all">
    <div class="flex items-center space-x-3">
        <i class="fab fa-whatsapp text-2xl"></i>
        <div class="text-left">
            <span class="block text-lg">EMIL SUÁREZ</span>
            <span class="text-[10px] uppercase tracking-widest opacity-80">Asesor Comercial</span>
        </div>
    </div>
    <i class="fas fa-chevron-right opacity-50"></i>
</button>

<script>
function enviarWhatsApp() {
    // Captura de datos de los inputs
    const nom = document.getElementById('nombre').value;
    const cel = document.getElementById('celular').value;
    const mot = document.getElementById('motivo').value;
    
    // Número destino verificado
    const numeroWhatsApp = "573207919193"; 

    // Validación simple
    if (!nom || !cel) {
        alert("⚠️ Por favor, ingresa tu nombre y celular para contactar al asesor.");
        return;
    }

    // Construcción del mensaje
    const mensaje = `⚡ *TRONEX MAYORISTA MONTERÍA* ⚡%0A%0A` +
                    `👤 *Cliente:* ${nom}%0A` +
                    `📱 *Celular:* ${cel}%0A` +
                    `🎯 *Interés:* ${mot}%0A%0A` +
                    `Hola Emil, vengo de la App. Me gustaría recibir información mayorista.`;

    // Apertura de WhatsApp
    const url = `https://api.whatsapp.com/send?phone=${numeroWhatsApp}&text=${mensaje}`;
    window.open(url, '_blank');
}
</script>
